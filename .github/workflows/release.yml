name: Build and Release macOS Plugin

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          brew install cmake ffmpeg gstreamer dylibbundler
          brew install --cask obs

      - name: Build OBS Plugin
        run: |
          # The install script handles fetching headers and compiling
          export OBS_VERSION="30.1.2"
          ./scripts/install.sh
          
      - name: Bundle and Fix GStreamer
        run: |
          # Copy the newly built binary into our pre-bundled plugin directory
          cp build/obs-airplay-source.plugin/Contents/MacOS/obs-airplay-source obs-airplay-source.plugin/Contents/MacOS/obs-airplay-source
          
          # Prepare the dmg template directory
          mkdir -p dmg_tmp
          cp Install.command dmg_tmp/
          cp -R obs-airplay-source.plugin dmg_tmp/
          
          # Fix the dylib paths inside the bundled plugin so it can run independently
          ./scripts/fix-bundled-gstreamer.sh dmg_tmp/obs-airplay-source.plugin
          
          # Sign all components inside dmg_tmp to pass Gatekeeper checks
          # Sign each dylib in Frameworks individually
          for f in dmg_tmp/obs-airplay-source.plugin/Contents/Frameworks/*.dylib; do
            if [[ -f "$f" ]]; then
              codesign --force --sign - "$f" >/dev/null 2>&1 || true
            fi
          done
          
          # Sign each dylib in gstreamer-1.0 plugins folder
          for f in dmg_tmp/obs-airplay-source.plugin/Contents/MacOS/gstreamer-1.0/*.dylib; do
            if [[ -f "$f" ]]; then
              codesign --force --sign - "$f" >/dev/null 2>&1 || true
            fi
          done
          
          # Sign the helper executable uxplay
          codesign --force --sign - dmg_tmp/obs-airplay-source.plugin/Contents/MacOS/uxplay >/dev/null 2>&1 || true
          
          # Temporarily move gstreamer-1.0 out to sign the main bundle, then move back
          if [[ -d "dmg_tmp/obs-airplay-source.plugin/Contents/MacOS/gstreamer-1.0" ]]; then
            mv dmg_tmp/obs-airplay-source.plugin/Contents/MacOS/gstreamer-1.0 dmg_tmp/obs-airplay-source.plugin/gstreamer-1.0-temp
            codesign --force --sign - dmg_tmp/obs-airplay-source.plugin/Contents/MacOS/obs-airplay-source >/dev/null 2>&1 || true
            codesign --force --sign - dmg_tmp/obs-airplay-source.plugin >/dev/null 2>&1 || true
            mv dmg_tmp/obs-airplay-source.plugin/gstreamer-1.0-temp dmg_tmp/obs-airplay-source.plugin/Contents/MacOS/gstreamer-1.0
          else
            codesign --force --sign - dmg_tmp/obs-airplay-source.plugin/Contents/MacOS/obs-airplay-source >/dev/null 2>&1 || true
            codesign --force --sign - dmg_tmp/obs-airplay-source.plugin >/dev/null 2>&1 || true
          fi
          
          # Create DMG
          hdiutil create -volname "OBS AirPlay Installer" -srcfolder dmg_tmp -ov -format UDZO obs-airplay-installer.dmg

      - name: Upload Release Artifact
        uses: softprops/action-gh-release@v1
        with:
          files: obs-airplay-installer.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
